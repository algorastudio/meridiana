name: Test and Build Meridiana

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # FASE 1: TEST (Gira su Linux per velocità e supporto Docker)
  # ==========================================
  test-database-and-code:
    runs-on: ubuntu-latest
    
    # Creiamo un database PostgreSQL temporaneo ("usa e getta")
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: catasto_storico
          POSTGRES_USER: postgres  # Sostituisca con l'utente del suo config.py
          POSTGRES_PASSWORD: testpassword # Sostituisca con la password di test
        # Esponiamo la porta standard di PostgreSQL
        ports:
          - 5432:5432
        # GitHub aspetterà che il DB sia pronto prima di procedere
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Dipendenze per i Test
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tests/requirements-test.txt

    # Questo è il passaggio chiave: Popoliamo il DB temporaneo usando i SUOI script!
    - name: Inizializzazione Database di Test
      env:
        PGPASSWORD: testpassword
      run: |
        # Installiamo il client PostgreSQL su Linux
        sudo apt-get install -y postgresql-client
        
        # Lanciamo i suoi script SQL in ordine per creare tabelle e funzioni
        # (Modifichi i nomi dei file se necessario in base alla sua cartella sql_scripts)
        psql -h localhost -U postgres -d catasto_storico -f sql_scripts/02_creazione-schema-tabelle.sql
        psql -h localhost -U postgres -d catasto_storico -f sql_scripts/03_funzioni-procedure.sql
        psql -h localhost -U postgres -d catasto_storico -f sql_scripts/04b_dati_test_realistici.sql

    - name: Esecuzione Test Automatici (Pytest)
      env:
        # Passiamo le credenziali di test al suo codice Python (config.py dovrà leggerle!)
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASS: testpassword
        DB_NAME: catasto_storico
      run: |
        pytest tests/

  # ==========================================
  # FASE 2: BUILD (Gira su Windows SOLO se i test passano)
  # ==========================================
  build-windows:
    # La riga seguente dice: "Non partire se il job 'test-database-and-code' fallisce!"
    needs: test-database-and-code 
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compilazione Eseguibile (PyInstaller)
      run: pyinstaller meridiana.spec
      
    - name: Compilazione Installer (Inno Setup)
      run: iscc Meridiana_Installer.iss

    - name: Upload Installer Finito
      uses: actions/upload-artifact@v4
      with:
        name: Meridiana-Setup-Windows
        path: Output\*.exe