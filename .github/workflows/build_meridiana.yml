name: Build and Package Meridiana

# 1. Quando deve partire questa automazione?
on:
  push:
    branches: [ "main", "master" ] # Si attiva ad ogni caricamento sul ramo principale
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permette di avviare l'azione anche manualmente dal sito di GitHub

jobs:
  build-and-deploy:
    # 2. Ambiente di esecuzione (Windows, necessario per Inno Setup e PyInstaller per Windows)
    runs-on: windows-latest

    steps:
    # 3. Scarica il codice dal repository
    - name: Checkout del codice
      uses: actions/checkout@v4

    # 4. Installa Python sul server di GitHub
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Modifichi con la versione esatta che sta usando (es. 3.11)

    # 5. Installa le librerie necessarie (PyQt5, Psycopg2, PyInstaller, ecc.)
    - name: Installazione Dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tests/requirements-test.txt
        pip install pyinstaller pytest

    # 6. Esegue la suite di Test (Continuous Integration)
    - name: Esecuzione Test Automatici
      run: |
        pytest tests/
      # NOTA: Se i test richiedono un DB PostgreSQL reale attivo, questa fase potrebbe fallire. 
      # In tal caso, disabiliti temporaneamente questo step o mi chieda come "mockare" il database.

    # 7. Crea l'eseguibile standalone (.exe) con PyInstaller
    - name: Compilazione Eseguibile (PyInstaller)
      run: |
        pyinstaller meridiana.spec
      
    # 8. Crea il file di installazione (setup.exe) con Inno Setup
    # I runner Windows di GitHub hanno già Inno Setup (iscc) preinstallato!
    - name: Compilazione Installer (Inno Setup)
      run: |
        iscc Meridiana_Installer.iss

    # 9. Carica l'installer finito in modo che lei possa scaricarlo da GitHub
    - name: Upload Installer Finito
      uses: actions/upload-artifact@v4
      with:
        name: Meridiana-Setup-Windows
        # Assicurarsi che il percorso coincida con l'Outputdir definito nel suo file .iss
        # Solitamente Inno Setup salva nella cartella "Output"
        path: Output\*.exe