name: CI/CD Meridiana (Test, Build & Release)

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ==========================================
  # FASE 1: TEST (su Linux con PostgreSQL)
  # ==========================================
  test-database-and-code:
    runs-on: ubuntu-latest
    

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: catasto_storico
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Installazione Dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r tests/requirements-test.txt

    - name: Inizializzazione Database di Test
      env:
        PGPASSWORD: testpassword
      run: |
        sudo apt-get install -y postgresql-client
        psql -h localhost -U postgres -d catasto_storico -f sql_scripts/02_creazione-schema-tabelle.sql
        psql -h localhost -U postgres -d catasto_storico -f sql_scripts/03_funzioni-procedure.sql

    - name: Esecuzione Test Automatici (Pytest)
      env:
        CI: true
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASS: testpassword
        DB_NAME: catasto_storico
        DB_PORT: 5432
      run: |
        python -m pytest tests/

  # ==========================================
  # FASE 2: BUILD (su Windows con Inno Setup)
  # ==========================================
  build-windows:
    needs: test-database-and-code
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Installazione Dipendenze per Build
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compilazione Eseguibile con PyInstaller
      run: pyinstaller meridiana.spec --clean --noconfirm

    - name: Compilazione Installer con Inno Setup
      run: iscc Meridiana_Installer.iss

    - name: Caricamento Installer come Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Meridiana-Setup-Windows
        path: Installer\*.exe
        retention-days: 1

  # ==========================================
  # FASE 3: RELEASE (solo su tag v*)
  # ==========================================
  publish-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: Meridiana-Setup-Windows
        path: installer-output

    - name: Crea GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "Meridiana ${{ github.ref_name }}"
        body: |
          ## Meridiana ${{ github.ref_name }}

          ### Installazione
          1. Scarica il file `Meridiana_*_Setup.exe`
          2. Esegui l'installer come amministratore
          3. Segui la procedura guidata

          ### Requisiti
          - Windows 10 o superiore
          - PostgreSQL (configurazione separata)

          ---
          *Meridiana - Archivio Catastale Storico*
          *Copyright © Marco Santoro. In gentile concessione gratuita all'Archivio di Stato di Savona.*
        draft: false
        prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
        files: installer-output/*.exe
